services:
  - type: web
    name: moto-ai-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: PORT
        value: "3099"
      - key: DATABASE_URL
        value: "file:./dev.db"
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: QWEN_MODEL
        value: qwen-turbo
    healthCheckPath: /api/health
